type User @table {
  username: String!
  email: String!
  passwordHash: String!
  createdAt: Timestamp!
  profilePictureUrl: String
  bio: String
}

type Movie @table {
  title: String!
  releaseYear: Int!
  createdAt: Timestamp!
  description: String
  director: String
  posterUrl: String
  runtimeMinutes: Int
  genre: String
}

type WatchEntry @table {
  user: User!
  movie: Movie!
  watchDate: Date!
  createdAt: Timestamp!
  location: String
}

type Review @table {
  user: User!
  movie: Movie!
  watchEntry: WatchEntry
  rating: Int!
  isPublic: Boolean!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  reviewText: String
}

type MovieList @table {
  user: User!
  name: String!
  isPublic: Boolean!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  description: String
}

type MovieListMovie @table(key: ["movieList", "movie"]) {
  movieList: MovieList!
  movie: Movie!
  orderIndex: Int!
  note: String
}